<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queue Joy - It's Your Turn!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn .6s ease-out; }
    @keyframes fadeIn { from {opacity:0;transform:translateY(8px)} to {opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 flex items-center justify-center p-4">

  <main class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-8 text-center space-y-6 fade-in">
    <header class="space-y-2">
      <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 grid place-items-center text-white shadow-md">
        <svg viewBox="0 0 24 24" class="w-8 h-8" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-indigo-900">It’s Your Turn!</h1>
      <p class="text-gray-600">Please proceed to the counter below</p>
    </header>

    <section class="space-y-3">
      <div class="rounded-xl border-2 border-indigo-200 bg-indigo-50/70 p-4">
        <p class="text-sm text-indigo-600 font-medium">Your Queue Number</p>
        <p id="yourNumber" class="mt-1 text-5xl font-black text-indigo-900 tracking-wide">--</p>
      </div>

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
        <p class="text-sm text-gray-600">Proceed To</p>
        <p id="counterName" class="mt-1 text-2xl font-bold text-purple-700">--</p>
      </div>

      <p id="hint" class="text-xs text-gray-500 italic">(You’ll be notified with a soft sound + push when it’s your turn.)</p>
    </section>

    <div id="errorBox" class="hidden rounded-lg border border-red-200 bg-red-50 p-3 text-red-700 text-sm"></div>
  </main>

  <!-- Soft notification sound -->
  <audio id="alertSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/notifications/notification_simple-01.ogg" type="audio/ogg">
  </audio>

  <!-- Firebase + page logic (module) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue, off, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ---------- Firebase config (unchanged) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDiRGvkQbnLlpnJT3fEEQrY1A3nwLVIFY0",
      authDomain: "queue-joy-aa21b.firebaseapp.com",
      databaseURL: "https://queue-joy-aa21b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "queue-joy-aa21b",
      storageBucket: "queue-joy-aa21b.firebasestorage.app",
      messagingSenderId: "950240394209",
      appId: "1:950240394209:web:78d4f2471d2d89ac91f0a0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Expose a safe helper so OneSignal init script (non-module) can save mapping
    window.saveSubscriberForQueue = async function (playerId, qKey) {
      try {
        if (!playerId || !qKey) return;
        await set(ref(db, `queueSubscriptions/${qKey}`), playerId);
        console.log('[saveSubscriberForQueue] saved', playerId, '=>', qKey);
      } catch (e) {
        console.warn('[saveSubscriberForQueue] failed', e);
      }
    };

    // ---------- DOM ----------
    const yourNumberEl = document.getElementById("yourNumber");
    const counterNameEl = document.getElementById("counterName");
    const errorBox = document.getElementById("errorBox");
    const sound = document.getElementById("alertSound");

    const showError = (msg) => {
      errorBox.textContent = msg;
      errorBox.classList.remove("hidden");
      console.error(msg);
    };

    const getParam = (keys) => {
      const usp = new URLSearchParams(window.location.search);
      for (const k of keys) {
        const v = usp.get(k);
        if (v) return v;
      }
      return null;
    };

    // queueKey (support multiple param names)
    const queueKey = getParam(['queueId','queueid','qid','id']);
    if (!queueKey) {
      showError('Missing queueId in URL.');
      throw new Error('Missing queueId');
    }
    console.log('[your_turn] queueKey=', queueKey);

    // avoid double notifications
    let notified = false;

    // read queue entry, show data, and notify
    const queueRef = ref(db, `queue/${queueKey}`);
    onValue(queueRef, async (snap) => {
      if (!snap.exists()) {
        showError('Your queue entry was not found.');
        return;
      }
      const q = snap.val() || {};
      const ticket = q.ticketNumber || q.queueId || q.id || q.number || q.queueNo || q.ticket || null;
      const counterId = q.counterAssigned || q.counterId || q.counter || null;
      yourNumberEl.textContent = ticket || '—';

      if (counterId) {
        const counterRef = ref(db, `counters/${counterId}`);
        onValue(counterRef, async (cSnap) => {
          if (!cSnap.exists()) return;
          const c = cSnap.val() || {};
          const counterName = c.name || `Counter ${counterId}`;
          counterNameEl.textContent = counterName;

          // since this is the your_turn page, notify once as soon as counter is present
          if (!notified) {
            notified = true;
            await triggerNotification(ticket, counterName);
          }
        });
      }
    }, (err) => {
      showError('Failed to read your queue entry. Please refresh.');
      console.error(err);
    });

    // attempt server push (Netlify function), fallback to native notifications
    async function sendServerNotificationToPlayer(playerId, title, body, url) {
      if (!playerId) return { ok:false, error:'missing playerId' };
      try {
        const res = await fetch('/.netlify/functions/sendNotification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId, title, body, url })
        });
        if (!res.ok) {
          const txt = await res.text().catch(()=>null);
          return { ok:false, status: res.status, text: txt };
        }
        const json = await res.json().catch(()=>null);
        return { ok:true, json };
      } catch (e) {
        return { ok:false, error: e };
      }
    }

    async function triggerNotification(ticket, counterName) {
      const title = "Queue Joy — It's Your Turn!";
      const body = `Ticket ${ticket || ''} → ${counterName || ''}`;

      // 1) play soft sound
      try { sound.currentTime = 0; await sound.play(); console.log('[notify] sound played'); } catch (e) { console.warn('[notify] sound play blocked', e); }

      // 2) Try server-side OneSignal push using mapping stored in DB
      try {
        const playerSnap = await get(ref(db, `queueSubscriptions/${queueKey}`));
        const playerIdFromDB = playerSnap.exists() ? playerSnap.val() : null;
        console.log('[notify] playerIdFromDB=', playerIdFromDB);
        if (playerIdFromDB) {
          const result = await sendServerNotificationToPlayer(playerIdFromDB, title, body, window.location.href);
          console.log('[notify] server push result', result);
        } else {
          console.log('[notify] no playerId mapping found in DB for queueKey');
        }
      } catch (e) {
        console.warn('[notify] server push attempt failed', e);
      }

      // 3) show native Notification fallback
      try {
        if ('Notification' in window) {
          if (Notification.permission === 'granted') {
            const n = new Notification(title, { body, icon: 'https://img.icons8.com/color/96/appointment-reminders.png', tag: `queuejoy-${queueKey}` });
            n.onclick = () => { try { window.focus(); } catch(_){}; };
            console.log('[notify] native notification shown');
          } else if (Notification.permission !== 'denied') {
            Notification.requestPermission().then(p => console.log('[notify] permission result', p));
          } else {
            console.log('[notify] native permission denied');
          }
        }
      } catch (e) {
        console.warn('[notify] native notification failed', e);
      }

      // 4) tiny UI confirmation
      try {
        const el = document.createElement('div');
        el.textContent = `${ticket || ''} → ${counterName || ''}`;
        Object.assign(el.style, {
          position: 'fixed', bottom: '18px', left: '50%', transform:'translateX(-50%)',
          background:'#0f172a', color:'#fff', padding:'8px 12px', borderRadius:'10px', zIndex:9999
        });
        document.body.appendChild(el);
        setTimeout(()=> el.remove(), 5000);
      } catch(_) {}
    }

    // cleanup
    window.addEventListener('beforeunload', () => {
      try { off(queueRef); } catch(_) {}
    });

    // log registered service workers for debugging
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        console.log('[SW] registrations:', regs.map(r => ({ scope: r.scope, scriptURL: r.active?.scriptURL || r.installing?.scriptURL })));
      }).catch(e => console.warn('[SW] getRegistrations failed', e));
    }
  </script>

  <!-- OneSignal SDK (single include) -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    // robust OneSignal init & playerId saving (uses window.saveSubscriberForQueue from module above)
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      console.log('[OneSignal] SDK Loaded (your_turn)');
      try {
        // point to the worker file that exists in your public root
        try { OneSignal.SERVICE_WORKER_PATH = "/OneSignalSDKWorker.js"; } catch(_) {}
        try { OneSignal.SERVICE_WORKER_UPDATER_PATH = "/OneSignalSDKUpdaterWorker.js"; } catch(_) {}

        await OneSignal.init({
          appId: "0bf8e638-a283-4b94-85dd-59a04fb48b06",
          notifyButton: { enable: false },
          serviceWorkerPath: "/OneSignalSDKWorker.js",
          allowLocalhostAsSecureOrigin: true
        });

        console.log('[OneSignal] initialized');

        // attempt to obtain playerId from multiple places
        let playerId = null;
        try {
          if (typeof OneSignal.getUserId === 'function') {
            playerId = await OneSignal.getUserId();
          }
        } catch(e) { /* ignore */ }

        try {
          if (!playerId && OneSignal.User && OneSignal.User.PushSubscription) {
            playerId = OneSignal.User.PushSubscription.id || null;
          }
        } catch(e) { /* ignore */ }

        console.log('[OneSignal] playerId probe ->', playerId);

        // Save mapping (if possible)
        try {
          const queueKey = new URLSearchParams(window.location.search).get('queueId');
          if (playerId && queueKey && typeof window.saveSubscriberForQueue === 'function') {
            await window.saveSubscriberForQueue(playerId, queueKey);
            console.log('[OneSignal] saved playerId -> queueSubscriptions/' + queueKey);
          }
        } catch(e) { console.warn('[OneSignal] save mapping failed', e); }

        // If playerId not yet available, listen for change event
        try {
          if (OneSignal.User && OneSignal.User.PushSubscription && typeof OneSignal.User.PushSubscription.addEventListener === 'function') {
            OneSignal.User.PushSubscription.addEventListener('change', async (state) => {
              try {
                const newId = state?.id || null;
                console.log('[OneSignal] PushSubscription change, id=', newId);
                const queueKey = new URLSearchParams(window.location.search).get('queueId');
                if (newId && queueKey && typeof window.saveSubscriberForQueue === 'function') {
                  await window.saveSubscriberForQueue(newId, queueKey);
                  console.log('[OneSignal] saved new playerId -> queueSubscriptions/' + queueKey);
                }
              } catch(e) { console.warn('PushSubscription change handler error', e); }
            });
          }
        } catch(e) { /* ignore */ }

      } catch (err) {
        console.warn('[OneSignal] init failed', err);
      }
    });
  </script>
</body>
</html>
