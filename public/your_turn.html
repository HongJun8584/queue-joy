<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queue Joy - It's Your Turn!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn .6s ease-out; }
    @keyframes fadeIn { from {opacity:0;transform:translateY(8px)} to {opacity:1;transform:translateY(0)} }
    /* small toast */
    .qj-toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background:#0f172a; color:white; padding:10px 14px; border-radius:10px; z-index:9999; box-shadow:0 8px 24px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 flex items-center justify-center p-4">

  <main class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-8 text-center space-y-6 fade-in">
    <header class="space-y-2">
      <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 grid place-items-center text-white shadow-md">
        <svg viewBox="0 0 24 24" class="w-8 h-8" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-indigo-900">It’s Your Turn!</h1>
      <p class="text-gray-600">Please proceed to the counter below</p>
    </header>

    <section class="space-y-3">
      <div class="rounded-xl border-2 border-indigo-200 bg-indigo-50/70 p-4">
        <p class="text-sm text-indigo-600 font-medium">Your Queue Number</p>
        <p id="yourNumber" class="mt-1 text-5xl font-black text-indigo-900 tracking-wide">--</p>
      </div>

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
        <p class="text-sm text-gray-600">Proceed To</p>
        <p id="counterName" class="mt-1 text-2xl font-bold text-purple-700">--</p>
      </div>

      <p id="hint" class="text-xs text-gray-500 italic">(You’ll be notified with a soft sound + email when it’s your turn.)</p>
    </section>

    <div id="errorBox" class="hidden rounded-lg border border-red-200 bg-red-50 p-3 text-red-700 text-sm"></div>
  </main>

  <!-- Soft notification sound -->
  <audio id="alertSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/notifications/notification_simple-01.ogg" type="audio/ogg">
  </audio>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue, off, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ---------- Firebase config (unchanged) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDiRGvkQbnLlpnJT3fEEQrY1A3nwLVIFY0",
      authDomain: "queue-joy-aa21b.firebaseapp.com",
      databaseURL: "https://queue-joy-aa21b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "queue-joy-aa21b",
      storageBucket: "queue-joy-aa21b.firebasestorage.app",
      messagingSenderId: "950240394209",
      appId: "1:950240394209:web:78d4f2471d2d89ac91f0a0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---------- DOM ----------
    const yourNumberEl = document.getElementById("yourNumber");
    const counterNameEl = document.getElementById("counterName");
    const errorBox = document.getElementById("errorBox");
    const sound = document.getElementById("alertSound");

    const showError = (msg) => {
      errorBox.textContent = msg;
      errorBox.classList.remove("hidden");
      console.error(msg);
    };

    const showToast = (text, timeout = 5000) => {
      try {
        const el = document.createElement('div');
        el.className = 'qj-toast';
        el.textContent = text;
        document.body.appendChild(el);
        setTimeout(()=> el.remove(), timeout);
      } catch(_) {}
    };

    const getParam = (keys) => {
      const usp = new URLSearchParams(window.location.search);
      for (const k of keys) {
        const v = usp.get(k);
        if (v) return v;
      }
      return null;
    };

    // queueKey (support multiple param names)
    const queueKey = getParam(['queueId','queueid','qid','id']);
    if (!queueKey) {
      showError('Missing queueId in URL.');
      throw new Error('Missing queueId');
    }
    console.log('[your_turn] queueKey=', queueKey);

    // avoid double notifications
    let notified = false;

    // read queue entry, show data, and notify
    const queueRef = ref(db, `queue/${queueKey}`);
    onValue(queueRef, async (snap) => {
      if (!snap.exists()) {
        showError('Your queue entry was not found.');
        return;
      }
      const q = snap.val() || {};
      const ticket = q.ticketNumber || q.queueId || q.id || q.number || q.queueNo || q.ticket || null;
      const counterId = q.counterAssigned || q.counterId || q.counter || null;
      yourNumberEl.textContent = ticket || '—';

      if (counterId) {
        const counterRef = ref(db, `counters/${counterId}`);
        onValue(counterRef, async (cSnap) => {
          if (!cSnap.exists()) return;
          const c = cSnap.val() || {};
          const counterName = c.name || `Counter ${counterId}`;
          counterNameEl.textContent = counterName;

          // since this is the your_turn page, notify once as soon as counter is present
          if (!notified) {
            notified = true;
            await triggerNotification(ticket, counterName);
          }
        });
      }
    }, (err) => {
      showError('Failed to read your queue entry. Please refresh.');
      console.error(err);
    });

    // -------------- Trigger logic --------------
    // Calls a serverless endpoint to send email via Brevo (server must have API key)
    async function sendEmailViaServer(payload) {
      try {
        console.log('[sendEmailViaServer] payload:', payload);
        const res = await fetch('/.netlify/functions/sendEmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const text = await res.text().catch(()=>null);
        console.log('[sendEmailViaServer] response', res.status, text);
        return { ok: res.ok, status: res.status, text };
      } catch (e) {
        console.warn('[sendEmailViaServer] failed', e);
        return { ok: false, error: e };
      }
    }

    async function triggerNotification(ticket, counterName) {
      const title = "Queue Joy — It's Your Turn!";
      const body = `Ticket ${ticket || ''} → ${counterName || ''}`;

      // 1) Play the soft local sound
      try {
        sound.currentTime = 0;
        await sound.play().catch(()=>{ console.warn('[sound] autoplay blocked'); });
        console.log('[triggerNotification] sound played (or attempted)');
      } catch (e) {
        console.warn('[triggerNotification] sound error', e);
      }

      // 2) Ask server to send email (server will be responsible for looking up subscriber email(s))
      try {
        const payload = {
          queueKey,
          title,
          body,
          url: window.location.href
        };
        const serverResult = await sendEmailViaServer(payload);
        if (serverResult.ok) {
          console.log('[triggerNotification] server email requested');
        } else {
          console.warn('[triggerNotification] server email failed', serverResult);
        }
      } catch (e) {
        console.warn('[triggerNotification] server email error', e);
      }

      // 3) Native Notification fallback for instant on-screen alert
      try {
        if ('Notification' in window) {
          if (Notification.permission === 'granted') {
            const n = new Notification(title, { body, icon: 'https://img.icons8.com/color/96/appointment-reminders.png', tag:`queuejoy-${queueKey}` });
            n.onclick = () => { try { window.focus(); } catch(_){}; };
            console.log('[triggerNotification] native notification shown');
          } else if (Notification.permission !== 'denied') {
            // request permission, but do not block the flow
            Notification.requestPermission().then(p => console.log('[triggerNotification] permission result', p));
          } else {
            console.log('[triggerNotification] native Notification permission denied');
          }
        } else {
          console.log('[triggerNotification] Notifications API not available');
        }
      } catch (e) {
        console.warn('[triggerNotification] native notification failed', e);
      }

      // 4) visual toast
      showToast(`${title} — ${body}`, 7000);
    }

    // cleanup
    window.addEventListener('beforeunload', () => {
      try { off(queueRef); } catch(_) {}
    });

    // debug: list any registered service workers (should be none related to OneSignal)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        console.log('[SW] registrations:', regs.map(r => ({ scope: r.scope, scriptURL: r.active?.scriptURL || r.installing?.scriptURL })));
      }).catch(e => console.warn('[SW] getRegistrations failed', e));
    }
  </script>

  <!-- NOTE: No OneSignal SDK, no OneSignal code here. -->
</body>
</html>
