<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Joy - Your Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      80%, 100% { transform: scale(1.2); opacity: 0; }
    }
    /* small helper for hint - hidden now because notifications moved to your_turn.html */
    #notifyHint { display: none; }
    #notifyHint button { font-weight:600; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex flex-col items-center justify-center p-4 pb-32">

  <!-- NOTE: Notification UI and OneSignal removed. Notifications are handled in your_turn.html -->

  <!-- Main Card -->
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-6 space-y-6 text-center fade-in">
    <div class="space-y-2">
      <div class="w-16 h-16 bg-gradient-to-r from-purple-600 to-indigo-500 rounded-full flex items-center justify-center mx-auto">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-indigo-800">Queue Status</h1>
      <p id="counterName" class="text-sm text-gray-600">--</p>
    </div>

    <div class="bg-gradient-to-r from-purple-100 to-indigo-100 rounded-xl p-4 border-2 border-purple-200">
      <p class="text-sm text-purple-600 font-medium">Your Number</p>
      <p id="yourNumber" class="text-4xl font-bold text-purple-800">--</p>
    </div>

    <div class="space-y-4">
      <div class="bg-gray-50 rounded-xl p-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm text-gray-600">Now Serving</span>
          <div id="statusIndicator" class="w-3 h-3 bg-green-400 rounded-full"></div>
        </div>
        <p id="nowServing" class="text-2xl font-bold text-indigo-600">--</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-sm text-gray-600">People Ahead</p>
          <p id="peopleAhead" class="text-xl font-bold text-gray-800">--</p>
        </div>
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-sm text-gray-600">Est. Wait</p>
          <p id="estimatedWait" class="text-xl font-bold text-gray-800">--</p>
        </div>
      </div>
    </div>

    <button id="gameBtn"
      class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-500 text-white font-semibold rounded-2xl shadow-lg hover:scale-105 transition-all duration-300">
      🎮 Play While Waiting
    </button>

    <div id="errorMessage" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-red-600 text-sm text-center"></p>
    </div>
  </div>

  <!-- Advertisement -->
  <div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 w-full max-w-sm px-4">
    <div class="bg-white rounded-xl shadow-lg p-3">
      <p class="text-xs text-gray-500 text-center mb-2">Advertisement</p>
      <img id="adPanel" src="" alt="Advertisement"
           class="w-full rounded-lg shadow-md hidden max-h-24 object-cover">
      <div id="noAd" class="text-center text-gray-400 text-sm py-4">
        No advertisement available
      </div>
    </div>
  </div>

  <!-- Audio: keep local beep sound only (no notifications here) -->
  <audio id="beepSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
  </audio>

  <!-- Firebase + Logic (no OneSignal, no notification permission prompts) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDiRGvkQbnLlpnJT3fEEQrY1A3nwLVIFY0",
      authDomain: "queue-joy-aa21b.firebaseapp.com",
      databaseURL: "https://queue-joy-aa21b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "queue-joy-aa21b",
      storageBucket: "queue-joy-aa21b.appspot.com",
      messagingSenderId: "950240394209",
      appId: "1:950240394209:web:78d4f2471d2d89ac91f0a0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Elements
    const yourNumber = document.getElementById('yourNumber');
    const counterNameEl = document.getElementById('counterName');
    const nowServing = document.getElementById('nowServing');
    const peopleAhead = document.getElementById('peopleAhead');
    const estimatedWait = document.getElementById('estimatedWait');
    const statusIndicator = document.getElementById('statusIndicator');
    const gameBtn = document.getElementById('gameBtn');
    const errorMessage = document.getElementById('errorMessage');
    const adPanelEl = document.getElementById('adPanel');
    const noAd = document.getElementById('noAd');
    const beepSound = document.getElementById('beepSound');

    // State
    let queueRef = null;
    let counterRef = null;
    let servingRef = null;
    let adRef = null;
    let queueKey = null;
    let lastServingValue = null;
    let pushHandled = false; // we use this to ensure single redirect+sound

    function playBeep() {
      try {
        // preferred: audio element (plays even on some mobile where WebAudio may be blocked)
        beepSound.currentTime = 0;
        beepSound.play().catch(()=>{ /* ignore autoplay block */ });

        // fallback short beep via WebAudio for browsers that support it
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = 880;
        o.connect(g);
        g.connect(ctx.destination);
        g.gain.value = 0.02;
        o.start();
        setTimeout(()=>{ o.stop(); ctx.close(); }, 180);
      } catch (e) {
        // silent fail
      }
    }

    function showError(message) {
      errorMessage.querySelector('p').textContent = message;
      errorMessage.classList.remove('hidden');
      setTimeout(() => {
        errorMessage.classList.add('hidden');
      }, 5000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      queueKey = params.get('queueId');
      if (!queueKey) {
        console.error('No queueId provided — redirecting to index.');
        window.location.href = 'index.html';
        return;
      }

      // Load advertisement listener (optional)
      adRef = ref(db, 'settings/adImage');
      onValue(adRef, (snap) => {
        if (snap.exists() && snap.val()) {
          adPanelEl.src = snap.val();
          adPanelEl.classList.remove('hidden');
          noAd.classList.add('hidden');
        } else {
          adPanelEl.classList.add('hidden');
          noAd.classList.remove('hidden');
        }
      });

      // Main queue listener
      queueRef = ref(db, `queue/${queueKey}`);
      onValue(queueRef, (snap) => {
        if (!snap.exists()) {
          showError('Your queue entry was not found.');
          setTimeout(() => window.location.href = 'index.html', 2000);
          return;
        }

        const q = snap.val() || {};
        const counterId = q.counterId || q.counterAssigned || q.counter || null;
        const queueId = q.queueId || q.ticketNumber || q.id || q.number || '--';
        yourNumber.textContent = queueId;

        if (!counterRef && counterId) {
          counterRef = ref(db, `settings/counters/${counterId}`);
          onValue(counterRef, (counterSnap) => {
            if (!counterSnap.exists()) return;
            const counterData = counterSnap.val();
            counterNameEl.textContent = counterData.name || 'Counter';

            const prefix = counterData.prefix || (String(queueId).match(/^[A-Za-z]+/)?.[0] || '');
            const yourNumberNum = parseInt(String(queueId).replace(prefix, ""), 10) || 0;

            // Now Serving listener
            servingRef = ref(db, `counters/${counterId}/nowServing`);
            onValue(servingRef, (nowSnap) => {
              const currentServing = nowSnap.val() || 0;
              nowServing.textContent = `${prefix}${String(currentServing).padStart(3, "0")}`;

              if (lastServingValue === null) lastServingValue = currentServing;
              if (currentServing !== lastServingValue) {
                // reset pushHandled so we can handle new "turn" events (no push here — only sound+redirect)
                pushHandled = false;
                lastServingValue = currentServing;
              }

              const ahead = Math.max(0, yourNumberNum - currentServing);
              peopleAhead.textContent = ahead;
              estimatedWait.textContent = ahead > 0 ? `${ahead * 2} min` : 'Soon';

              // Visual status indicator + actions when it's very close / turn
              if (ahead === 0) {
                // Animate indicator and navigate to your_turn after short delay
                statusIndicator.className = 'w-3 h-3 bg-green-400 rounded-full animate-pulse';
                if (!pushHandled) {
                  pushHandled = true;
                  // play sound and redirect to the dedicated your_turn page
                  try { playBeep(); } catch (_) {}
                  setTimeout(() => {
                    window.location.href = "/your_turn.html?queueId=" + encodeURIComponent(queueKey);
                  }, 1600);
                }
              } else if (ahead <= 2) {
                statusIndicator.className = 'w-3 h-3 bg-yellow-400 rounded-full animate-pulse';
                // optional gentle nudge sound once when very close (non-intrusive)
                if (!pushHandled && ahead === 2) {
                  // play a softer beep once (don't redirect)
                  pushHandled = true;
                  try {
                    // softer short beep
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.value = 660;
                    o.connect(g);
                    g.connect(ctx.destination);
                    g.gain.value = 0.01;
                    o.start();
                    setTimeout(()=>{ o.stop(); ctx.close(); }, 120);
                  } catch (_) {}
                }
              } else {
                statusIndicator.className = 'w-3 h-3 bg-blue-400 rounded-full';
                // reset pushHandled so the next important event can trigger sound+redirect
                // (handled above by comparing lastServingValue)
              }
            });
          });
        }
      }, (err) => {
        console.error('queueRef read error', err);
        showError('Failed to read queue status. Please refresh.');
      });

      // Clean up on unload
      window.addEventListener('beforeunload', () => {
        try {
          if (queueRef) off(queueRef);
          if (counterRef) off(counterRef);
          if (servingRef) off(servingRef);
          if (adRef) off(adRef);
        } catch (_) {}
      });

      // Game button
      gameBtn.addEventListener('click', () => {
        fetch('game.html', { method: 'HEAD' })
          .then(res => {
            if (res.ok) {
              window.location.href = 'game.html';
            } else {
              alert('Game is currently unavailable. Please wait or enjoy our ad!');
            }
          })
          .catch(() => {
            alert('Game could not be loaded. Please try again later.');
          });
      });
    });
  </script>
</body>
</html>
